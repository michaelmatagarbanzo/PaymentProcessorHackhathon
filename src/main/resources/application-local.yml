spring:
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${MONGO_DATABASE:DBHackhathon2026}
      collections:    
        transactions: Transactions
        terminals: Terminals
switch:
  appconnector:
    base-url: ${SWITCH_BASE_URL:http://localhost:7071}
    api-key: ${SWITCH_API_KEY:}
    health-url: ${SWITCH_HEALTH_URL:https://appconnector-demo-func-fnbpapgcf3h2eza9.eastus-01.azurewebsites.net/api/health}
  # OAuth removed for AppConnector usage; AppConnector uses X-API-Key only

logging:
  level:
    root: INFO
    com.ecommerce.sale: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0

security:
  local-jwt-secret: 0123456789abcdef0123456789abcdef

app:
  debug:
    enabled: ${APP_DEBUG_ENABLED:true}
